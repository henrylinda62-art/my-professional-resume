name: Build And Push to ECR

on:
  push:
    # pull_request:
    # branches: ['main' , 'dev']
    branches: [ 'main' ]


permissions:
    id-token: write
    contents: read     
      

jobs:
  build_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPO }}/my-repo:latest .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.ECR_REPO }}/my-repo:latest
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2 # More information on this action can be found 
        with:
          aws-region: us-east-1
          role-to-assume: ${{ SECRETS.AWS_ROLE_ARN }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2 

      -  name: push imagen to Ecr
         run: docker push ${{ secrets.ECR_REPO }}/my-repo:latest
    
       
        