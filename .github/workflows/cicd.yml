name: my first pipeline

on:
    push:
        branches: ["main"]
    
    jobs:
        build:
            runs-on: ubuntu-latest #macos, windows-latest
            steps:
                - name: clone the code
                 uses: actions/checkout@v3 
                - name: build image
                  run:
                    docker build -t lhenry99/cicd-portfolio .
                - name: Docker login
                  uses: docker/login-action@v3 
                  with: 
                    username: lhney99
                    password: ${{ secrets.Docker_PASS }} 
                - name: push image
                  run:
                    docker push lhenry99/cicd-portfolio

    

            



                    




            
                


        
    

    