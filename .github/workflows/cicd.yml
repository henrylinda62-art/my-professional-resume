name: my first pipeline

on:
    push:
        branches: ["main"]
    
jobs:
    build:
      runs-on: ubuntu-latest #macos, windows-latest
      steps:
       - name: Clone the code
         uses: actions/checkout@v3
       - name: Build image
         run:
          docker build -t lhenry1999/cidc-portfolio .
       - name: Docker login
         uses: docker/login-action@v3
         with:
           username: lhenry1999
           password: ${{ secrets.DOCKER_PASS }}
       - name: push image
         run:
            docker push lhenry1999/cidc-portfolio





    

            



                    




            
                


        
    

    